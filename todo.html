<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Task Manager</title>
    <link rel="stylesheet" href="styles/todo-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-tasks"></i> My Tasks</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>
        </header>

        <!-- Main Todo Container -->
        <main class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn" title="Add Task">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div class="input-options">
                    <select id="categorySelect" class="category-select">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="education">Education</option>
                    </select>
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>
            </div>

            <!-- Filter & Sort Section -->
            <div class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        <i class="fas fa-circle"></i> Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check-circle"></i> Completed
                    </button>
                </div>
                <div class="sort-options">
                    <button class="sort-btn" id="sortBtn" title="Sort Tasks">
                        <i class="fas fa-sort"></i> Sort
                    </button>
                    <button class="clear-btn" id="clearCompleted" title="Clear Completed">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                </div>
            </div>

            <!-- Sort Menu (Hidden by default) -->
            <div class="sort-menu" id="sortMenu">
                <button class="sort-option" data-sort="date-new">
                    <i class="fas fa-arrow-down"></i> Newest First
                </button>
                <button class="sort-option" data-sort="date-old">
                    <i class="fas fa-arrow-up"></i> Oldest First
                </button>
                <button class="sort-option" data-sort="priority">
                    <i class="fas fa-exclamation-circle"></i> By Priority
                </button>
                <button class="sort-option" data-sort="title">
                    <i class="fas fa-font"></i> Alphabetical
                </button>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value" id="remainingTasks">0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- Todo List -->
            <div class="todo-list" id="todoList">
                <!-- Todos will be added here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <i class="fas fa-inbox"></i>
                <h3>No tasks yet</h3>
                <p>Add a new task to get started!</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/todo-app.js"></script>
</body>
</html>
